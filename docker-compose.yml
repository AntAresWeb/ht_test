services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${UVICORN_PORT}:${UVICORN_PORT}"
    volumes:
      - .:/app 
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${UVICORN_PORT}/health"]
      interval: 30s
      timeout: 5s
      retries: 5
    env_file:
      - .env

  db:
    image: postgres:15-alpine
    volumes:
      - ./database:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 2s
      retries: 5
    env_file:
      - .env

volumes:
  database:
